# Crawl4AI self-hosted en el VPS (renderiza páginas → markdown limpio para extraer
# menús). Solo escucha en loopback; nginx lo expone en scrape.nidokey.es con TLS +
# un bearer compartido (CRAWL4AI_SECRET). Ver crawl4ai/README.md.
services:
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: nidokey-crawl4ai
    restart: unless-stopped
    shm_size: "1g" # Chromium necesita /dev/shm grande para no petar
    ports:
      - "127.0.0.1:11235:11235" # SOLO loopback; nunca expongas 11235 a internet
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:11235/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
