# nginx vhost para Crawl4AI → /etc/nginx/conf.d/scrape.nidokey.es.conf
# Crawl4AI NO trae auth por defecto, así que la puerta la pone nginx: exige
# Authorization: Bearer <CRAWL4AI_SECRET>. TLS lo añade certbot (`certbot --nginx
# -d scrape.nidokey.es`), que reescribe este bloque para escuchar en 443.
#
# 1) Sustituye REEMPLAZA_CON_CRAWL4AI_SECRET por el secreto real (el MISMO que pones
#    en Vercel como CRAWL4AI_SECRET). Genera uno:
#      node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
# 2) nginx -t && systemctl reload nginx
# 3) certbot --nginx -d scrape.nidokey.es

server {
    listen 80;
    server_name scrape.nidokey.es;

    # Cuerpo de petición pequeño: solo mandamos { urls, ...config }.
    client_max_body_size 256k;

    location / {
        # Bearer compartido. Cualquier petición sin el secreto exacto → 401.
        if ($http_authorization != "Bearer REEMPLAZA_CON_CRAWL4AI_SECRET") {
            return 401;
        }

        proxy_pass http://127.0.0.1:11235;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Renderizar con Playwright puede tardar; deja margen (> timeout del cliente).
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
