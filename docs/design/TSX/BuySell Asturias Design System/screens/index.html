<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>BuySell · Inmuebles — todas las plataformas</title>
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #FAFAF7; }
  body { font-family: "Inter", system-ui, sans-serif; color: #1A1A18; }
  iframe { display: block; border: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" data-presets="env,react">
  const Frame = ({ src }) => (
    <iframe src={src} style={{ width: "100%", height: "100%", background: "#FAFAF7" }}/>
  );

  function App() {
    return (
      <DesignCanvas title="BuySell — Inmuebles"
        subtitle="Vertical-tabs nav · 3 plataformas · pantalla representativa">
        <DCSection id="screens" title="Inmuebles (lista de propiedades)"
          subtitle="Web 1440×900 · Android 393×852 · iOS 393×852">
          <DCArtboard id="web"  label="Web · 1440 × 900" width={1440} height={900}>
            <Frame src="web-inmuebles.html"/>
          </DCArtboard>
          <DCArtboard id="and"  label="Android · 393 × 852" width={393} height={852}>
            <Frame src="mobile-android-inmuebles.html"/>
          </DCArtboard>
          <DCArtboard id="ios"  label="iOS · 393 × 852" width={393} height={852}>
            <Frame src="mobile-ios-inmuebles.html"/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
