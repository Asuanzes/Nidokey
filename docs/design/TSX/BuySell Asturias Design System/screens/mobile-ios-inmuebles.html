<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>BuySell · iOS · Inmuebles</title>
<link rel="icon" href="../assets/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        bg: "#FAFAF7", surface: "#FFFFFF",
        "surface-muted": "#F4F3EE", "surface-sunken": "#EFEEE8",
        border: "#E8E6E1", "border-strong": "#D4D1CA",
        text: "#1A1A18", "text-muted": "#6B6862",
        "text-subtle": "#9A9690", "text-inverse": "#FAFAF7",
        primary: { DEFAULT: "#3A5F8A", hover: "#2E4D70", soft: "#EAEFF6", fg: "#FAFAF7" },
        success: { DEFAULT: "#2D6A4F", soft: "#E8F1EC" },
        warning: { DEFAULT: "#A86A17", soft: "#F7EFDE" },
        danger:  { DEFAULT: "#A23E3E", soft: "#F6E5E5" },
        info:    { DEFAULT: "#2C7A8A", soft: "#E1EEF1" },
      },
      borderRadius: { sm: "4px", md: "6px", lg: "8px", xl: "12px" },
      fontFamily: { sans: ['"Inter"', "system-ui", "sans-serif"] },
    }},
  };
</script>
<style>
  html, body { margin: 0; padding: 0; background: #FAFAF7; }
  body { font-family: "Inter", -apple-system, "SF Pro Text", system-ui, sans-serif; }
  .tabular { font-variant-numeric: tabular-nums; }
  ::-webkit-scrollbar { display: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const Icon = ({ d, size = 16, sw = 2, className }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth={sw}
    strokeLinecap="round" strokeLinejoin="round"
    className={className} aria-hidden="true"
    dangerouslySetInnerHTML={{ __html: d }}/>
);
const I = {
  buildings: '<path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/>',
  search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  sparkles: '<path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6Z"/><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8Z"/>',
  dashboard: '<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
  activity: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
  download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  logout: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  pin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
  bed: '<path d="M2 4v16M2 8h18a2 2 0 0 1 2 2v10M2 17h20M6 8v9"/>',
  bath: '<path d="M9 6 6 3M19 13v3a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-3"/><path d="M3 13h18"/>',
  area: '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.83 0L6 21"/>',
  arrowDown: '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>',
  arrowUp:   '<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>',
};

const IconKey = ({ size = 18 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="1.5"
    strokeLinecap="round" strokeLinejoin="round">
    <circle cx="6.5" cy="12" r="3.3"/>
    <circle cx="6.5" cy="8" r="0.85" fill="#C49A4D" stroke="none"/>
    <path d="M9.8 12 H17"/>
    <path d="M17 12 H21 V17 H20 V15.5 H18.5 V17 H17 Z" fill="#C49A4D"/>
  </svg>
);

const RAIL_GROUPS = [
  { id: "catalogo", accent: "#3A5F8A", items: [
    { id: "inmuebles", icon: I.buildings, label: "Inmuebles" },
    { id: "duplicados",icon: I.sparkles,  label: "Duplicados", count: 3 },
  ]},
  { id: "analisis", accent: "#2C7A8A", items: [
    { id: "dashboard", icon: I.dashboard, label: "Dashboard" },
    { id: "actividad", icon: I.activity,  label: "Actividad" },
  ]},
  { id: "captura", accent: "#A86A17", items: [
    { id: "importar", icon: I.download, label: "Importar" },
  ]},
];
const RAIL_FOOTER = [
  { id: "perfil",  icon: I.user,     label: "Perfil" },
  { id: "ajustes", icon: I.settings, label: "Ajustes" },
];

function Rail({ current, onChange }) {
  return (
    <div className="flex w-14 shrink-0 flex-col border-r border-border bg-surface">
      <div className="flex h-14 items-center justify-center border-b border-border">
        <div className="flex h-9 w-9 items-center justify-center rounded-md bg-primary-soft text-primary ring-1 ring-inset ring-primary/15">
          <IconKey size={18}/>
        </div>
      </div>
      <div className="flex-1 overflow-y-auto py-2">
        {RAIL_GROUPS.map((g, gi) => (
          <React.Fragment key={g.id}>
            {gi > 0 && <div className="mx-3 my-2 h-px bg-border"/>}
            {g.items.map((it) => {
              const active = current === it.id;
              return (
                <button key={it.id}
                  onClick={() => onChange(it.id)}
                  aria-label={it.label}
                  className="relative mx-2 my-0.5 flex h-10 w-10 items-center justify-center rounded-md text-text-muted hover:bg-surface-muted"
                  style={ active ? { background: "#EAEFF6", color: "#3A5F8A" } : {} }>
                  {active && (
                    <span className="absolute -left-2 top-1.5 bottom-1.5 w-[2px] rounded-full"
                      style={{ background: g.accent }}/>
                  )}
                  <Icon d={it.icon} size={18}/>
                  {it.count != null && (
                    <span className="tabular absolute -right-0.5 -top-0.5 flex h-4 min-w-4 items-center justify-center rounded-full bg-danger px-1 text-[9px] font-semibold text-white">
                      {it.count}
                    </span>
                  )}
                </button>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      <div className="border-t border-border py-2">
        {RAIL_FOOTER.map((it) => (
          <button key={it.id} aria-label={it.label}
            className="mx-2 my-0.5 flex h-10 w-10 items-center justify-center rounded-md text-text-subtle hover:bg-surface-muted hover:text-text">
            <Icon d={it.icon} size={16}/>
          </button>
        ))}
      </div>
    </div>
  );
}

const PROPS = [
  { id: 1, title: "Piso luminoso en La Manjoya con vistas", type: "Piso", neighborhood: "La Manjoya", city: "Oviedo", status: "FOR_SALE", price: 195000, rooms: 3, baths: 2, area: 95, duplicates: 2, delta: -3.7 },
  { id: 2, title: "Chalet pareado con jardín y garaje", type: "Chalet", neighborhood: "Cabueñes", city: "Gijón", status: "RESERVED", price: 385000, rooms: 4, baths: 3, area: 180, duplicates: 0, delta: 0 },
  { id: 3, title: "Ático con terraza en el centro", type: "Ático", neighborhood: "Centro", city: "Avilés", status: "FOR_SALE", price: 165000, rooms: 2, baths: 1, area: 72, duplicates: 1, delta: -2.4 },
  { id: 4, title: "Estudio reformado cerca de la playa", type: "Estudio", neighborhood: "San Lorenzo", city: "Gijón", status: "SOLD", price: 89000, rooms: 0, baths: 1, area: 35, duplicates: 0, delta: 0 },
];

const STATUS = {
  FOR_SALE: { label: "En venta",  cls: "bg-info-soft text-info border-info/15" },
  RESERVED: { label: "Reservado", cls: "bg-warning-soft text-warning border-warning/20" },
  SOLD:     { label: "Vendido",   cls: "bg-success-soft text-success border-success/15" },
};
const fmtEUR = (n) => new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(n);

function StatusBadge({ s }) {
  const c = STATUS[s];
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-md border px-1.5 py-0.5 text-[11px] font-medium ${c.cls}`}>
      <span className="h-1.5 w-1.5 rounded-full bg-current opacity-70"/>{c.label}
    </span>
  );
}
function PriceDelta({ pct }) {
  if (!pct) return null;
  const down = pct < 0;
  return (
    <span className="tabular inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[11px] font-medium"
      style={{ background: down ? "#F0F7F2" : "#FDF2F2", color: down ? "#2D6A4F" : "#A23E3E" }}>
      <Icon d={down ? I.arrowDown : I.arrowUp} size={10}/>
      {Math.abs(pct).toFixed(1)}%
    </span>
  );
}

function PropertyCard({ p }) {
  return (
    <div className="overflow-hidden rounded-lg border border-border bg-surface shadow-xs">
      <div className="relative aspect-[16/10] bg-surface-muted">
        <div className="absolute inset-0 flex items-center justify-center text-text-subtle">
          <Icon d={I.image} size={26} sw={1.5}/>
        </div>
        <div className="absolute left-2.5 top-2.5"><StatusBadge s={p.status}/></div>
        {p.duplicates > 0 && (
          <div className="absolute right-2.5 top-2.5 inline-flex items-center gap-1 rounded-md bg-surface/95 px-1.5 py-0.5 text-[10px] font-medium text-primary shadow-xs">
            <Icon d={I.sparkles} size={9}/> {p.duplicates}
          </div>
        )}
      </div>
      <div className="space-y-2 p-3">
        <h3 className="line-clamp-2 text-[13px] font-semibold leading-snug text-text">{p.title}</h3>
        <div className="flex items-center gap-1 text-[12px] text-text-muted">
          <Icon d={I.pin} size={11}/>
          <span className="truncate">{p.type} · {p.neighborhood ? `${p.neighborhood}, ` : ""}{p.city}</span>
        </div>
        <div className="flex items-baseline justify-between">
          <div className="tabular text-[17px] font-semibold tracking-tight text-text">{fmtEUR(p.price)}</div>
          <PriceDelta pct={p.delta}/>
        </div>
        <div className="flex items-center gap-3 border-t border-border pt-2 text-[11px] text-text-muted">
          <span className="inline-flex items-center gap-1"><Icon d={I.bed} size={11}/> {p.rooms}</span>
          <span className="inline-flex items-center gap-1"><Icon d={I.bath} size={11}/> {p.baths}</span>
          <span className="inline-flex items-center gap-1 tabular"><Icon d={I.area} size={11}/> {p.area} m²</span>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// iOS system chrome — 47px top with Dynamic Island, home indicator
// ============================================================
function IOSStatusBar() {
  return (
    <div className="relative h-[47px] shrink-0 bg-surface">
      {/* time, left */}
      <div className="absolute left-7 top-1/2 -translate-y-1/2 text-[15px] font-semibold tabular text-text">9:41</div>
      {/* dynamic island */}
      <div className="absolute left-1/2 top-[11px] h-[31px] w-[110px] -translate-x-1/2 rounded-full bg-text"/>
      {/* right cluster — signal / wifi / battery */}
      <div className="absolute right-6 top-1/2 -translate-y-1/2 flex items-center gap-1.5 text-text">
        {/* signal */}
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><rect x="0" y="8" width="2.4" height="3" rx="0.6"/><rect x="3.6" y="6" width="2.4" height="5" rx="0.6"/><rect x="7.2" y="3.5" width="2.4" height="7.5" rx="0.6"/><rect x="10.8" y="1" width="2.4" height="10" rx="0.6"/></svg>
        {/* wifi */}
        <svg width="15" height="11" viewBox="0 0 24 18" fill="currentColor"><path d="M12 3.7C7.5 3.7 3.4 5.5.4 8.3l-.4.4 1.4 1.5.4-.3C4.5 7.4 8 5.9 12 5.9c4 0 7.5 1.5 10.2 4l.4.3 1.4-1.5-.4-.4C20.6 5.5 16.5 3.7 12 3.7Zm0 4.4c-3.3 0-6.2 1.3-8.5 3.4l-.4.4 1.5 1.4.4-.3c1.9-1.7 4.3-2.7 7-2.7s5.1 1 7 2.7l.4.3 1.5-1.4-.4-.4C18.2 9.4 15.3 8.1 12 8.1Zm0 4.5c-2 0-3.9.8-5.3 2l-.4.4L7.8 16l.4-.3c1-.9 2.3-1.4 3.8-1.4s2.8.5 3.8 1.4l.4.3 1.5-1.4-.4-.4c-1.4-1.2-3.3-2-5.3-2zm0 4.5c-.5 0-.9.2-1.2.5l-.4.4 1.6 1.4 1.6-1.4-.4-.4c-.3-.3-.7-.5-1.2-.5Z"/></svg>
        {/* battery */}
        <div className="relative flex h-[11px] w-[24px] items-center rounded-[3px] border border-current p-[1px]">
          <div className="h-full w-[17px] rounded-[1.5px] bg-current"/>
          <div className="absolute -right-[2.5px] top-1/2 h-1 w-0.5 -translate-y-1/2 rounded-r-sm bg-current"/>
        </div>
      </div>
    </div>
  );
}

function IOSHomeIndicator() {
  return (
    <div className="flex h-[34px] shrink-0 items-end justify-center bg-surface pb-2">
      <div className="h-[5px] w-[134px] rounded-full bg-text"/>
    </div>
  );
}

// ============================================================
// Page
// ============================================================
function InmueblesMobile() {
  const [current, setCurrent] = React.useState("inmuebles");
  return (
    <div className="flex h-[852px] w-[393px] flex-col overflow-hidden bg-bg text-text">
      <IOSStatusBar/>

      <div className="flex min-h-0 flex-1">
        <Rail current={current} onChange={setCurrent}/>

        <div className="flex min-w-0 flex-1 flex-col">
          {/* iOS-style header — large title, no bottom border until scroll */}
          <header className="bg-surface px-4 pt-3 pb-3 border-b border-border">
            <div className="flex items-start justify-between">
              <div>
                <h1 className="text-[22px] font-bold leading-tight tracking-[-0.02em] text-text">Inmuebles</h1>
                <p className="mt-0.5 text-[12px] text-text-muted">23 fichas · 4 nuevos esta semana</p>
              </div>
              <button className="-mr-1 flex h-9 w-9 items-center justify-center rounded-full text-primary active:bg-primary-soft">
                <Icon d={I.plus} size={20} sw={2.2}/>
              </button>
            </div>
            {/* Search field — unified with Android for cross-platform coherence */}
            <div className="relative mt-3">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-text-subtle">
                <Icon d={I.search} size={14}/>
              </span>
              <input
                type="search"
                placeholder="Buscar inmuebles, direcciones…"
                className="h-9 w-full rounded-md border border-border bg-bg pl-9 pr-3 text-[13px] text-text placeholder:text-text-subtle outline-none focus:border-primary"/>
            </div>
          </header>

          <main className="min-h-0 flex-1 overflow-y-auto px-3 py-3">
            <div className="space-y-3">
              {PROPS.map((p) => <PropertyCard key={p.id} p={p}/>)}
            </div>
            <div className="py-4 text-center text-[11px] text-text-subtle">— Fin de la lista —</div>
          </main>
        </div>
      </div>

      <IOSHomeIndicator/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<InmueblesMobile/>);
</script>
</body>
</html>
