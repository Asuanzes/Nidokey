<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; margin: 0; background: var(--bg); display: flex; gap: 32px; align-items: center; }
  .card { width: 130px; height: 80px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .meta { margin-top: 10px; font-size: 10px; color: var(--text-subtle); text-align: center; font-family: var(--font-mono); }
  .meta b { display: block; color: var(--text); font-family: var(--font-sans); font-weight: 500; font-size: 11px; margin-bottom: 2px; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="col">
    <div class="card" style="box-shadow:0 1px 2px rgba(20,20,18,0.04)">shadow-xs</div>
    <div class="meta"><b>xs</b>cards, stats, inputs</div>
  </div>
  <div class="col">
    <div class="card" style="box-shadow:0 1px 3px rgba(20,20,18,0.06),0 1px 2px rgba(20,20,18,0.04)">shadow-sm</div>
    <div class="meta"><b>sm</b>hover lift</div>
  </div>
  <div class="col">
    <div class="card" style="box-shadow:0 4px 12px rgba(20,20,18,0.06),0 1px 3px rgba(20,20,18,0.04)">shadow-md</div>
    <div class="meta"><b>md</b>dropdowns, overlays</div>
  </div>
</body>
</html>
