<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; margin: 0; }
  .row { display: grid; grid-template-columns: 80px 1fr 70px; align-items: baseline; gap: 16px; padding: 6px 0; border-top: 1px solid var(--border); }
  .row:first-child { border-top: 0; padding-top: 0; }
  .label { font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); }
  .sample { color: var(--text); }
  .meta { font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">3xl · h1 hero</div>
    <div class="sample" style="font-size:32px;line-height:40px;letter-spacing:-0.02em;font-weight:600">385.000 €</div>
    <div class="meta">32 / 40</div>
  </div>
  <div class="row">
    <div class="label">2xl · h1</div>
    <div class="sample" style="font-size:24px;line-height:32px;letter-spacing:-0.015em;font-weight:600">Dashboard</div>
    <div class="meta">24 / 32</div>
  </div>
  <div class="row">
    <div class="label">xl</div>
    <div class="sample" style="font-size:20px;line-height:28px;letter-spacing:-0.01em;font-weight:600">12 fichas</div>
    <div class="meta">20 / 28</div>
  </div>
  <div class="row">
    <div class="label">lg</div>
    <div class="sample" style="font-size:16px;line-height:24px;font-weight:600">Accede a tu cuenta</div>
    <div class="meta">16 / 24</div>
  </div>
</body>
</html>
