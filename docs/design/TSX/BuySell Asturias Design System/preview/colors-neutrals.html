<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: var(--surface); }
  .chip { height: 64px; border-bottom: 1px solid var(--border); }
  .meta { padding: 8px 10px; font-size: 11px; }
  .meta .name { color: var(--text); font-weight: 500; }
  .meta .hex { color: var(--text-subtle); font-family: var(--font-mono); margin-top: 2px; font-size: 10px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FAFAF7"></div><div class="meta"><div class="name">bg</div><div class="hex">#FAFAF7</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">surface</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F4F3EE"></div><div class="meta"><div class="name">surface-muted</div><div class="hex">#F4F3EE</div></div></div>
    <div class="swatch"><div class="chip" style="background:#EFEEE8"></div><div class="meta"><div class="name">surface-sunken</div><div class="hex">#EFEEE8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E8E6E1"></div><div class="meta"><div class="name">border</div><div class="hex">#E8E6E1</div></div></div>
    <div class="swatch"><div class="chip" style="background:#D4D1CA"></div><div class="meta"><div class="name">border-strong</div><div class="hex">#D4D1CA</div></div></div>
    <div class="swatch"><div class="chip" style="background:#9A9690"></div><div class="meta"><div class="name">text-subtle</div><div class="hex">#9A9690</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A18"></div><div class="meta"><div class="name">text</div><div class="hex">#1A1A18</div></div></div>
  </div>
</body>
</html>
