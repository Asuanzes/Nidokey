<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--surface);
  }
  .chip {
    height: 64px;
  }
  .meta { padding: 8px 10px; font-size: 11px; }
  .meta .name { color: var(--text); font-weight: 500; }
  .meta .hex { color: var(--text-subtle); font-family: var(--font-mono); letter-spacing: 0; margin-top: 2px; font-size: 10px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background:#3A5F8A"></div>
      <div class="meta"><div class="name">primary</div><div class="hex">#3A5F8A</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#2E4D70"></div>
      <div class="meta"><div class="name">primary-hover</div><div class="hex">#2E4D70</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#EAEFF6"></div>
      <div class="meta"><div class="name">primary-soft</div><div class="hex">#EAEFF6</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#C49A4D"></div>
      <div class="meta"><div class="name">brand-accent</div><div class="hex">#C49A4D</div></div>
    </div>
  </div>
</body>
</html>
