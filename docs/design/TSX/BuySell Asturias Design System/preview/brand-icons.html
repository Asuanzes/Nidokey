<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 8px 10px;
    display: flex; flex-direction: column; align-items: center;
    color: var(--primary);
  }
  .tile svg { width: 28px; height: 28px; }
  .label { margin-top: 8px; font-size: 11px; color: var(--text); font-weight: 500; }
  .sub { font-size: 10px; color: var(--text-subtle); margin-top: 1px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6.5" cy="12" r="3.3"/><circle cx="6.5" cy="8" r="0.85" fill="#C49A4D" stroke="none"/><path d="M9.8 12 H17"/><path d="M17 12 H21 V17 H20 V15.5 H18.5 V17 H17 Z" fill="#C49A4D"/></svg>
      <div class="label">Llave</div><div class="sub">canónico</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 9.5 L12 3 L20.5 9.5"/><path d="M5 9.5 V15 H19 V9.5"/><path d="M3 16.5 H21"/><path d="M6 17 V21"/><path d="M10 17 V21"/><path d="M14 17 V21"/><path d="M18 17 V21"/></svg>
      <div class="label">Hórreo</div><div class="sub">regional</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 L12 3.5 L21 11"/><path d="M5 10.5 V20 H19 V10.5"/><path d="M10.5 20 V14 H13.5 V20"/></svg>
      <div class="label">Casa</div><div class="sub">universal</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 19 L7 11 L10.5 15 L14 8 L18 13 L22 19"/><path d="M2 19 H22"/></svg>
      <div class="label">Picos</div><div class="sub">paisaje</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12.5 L11.5 4 H20 V12.5 L11.5 21 Z"/><circle cx="15.5" cy="8.5" r="1.4" fill="currentColor"/></svg>
      <div class="label">Etiqueta</div><div class="sub">precio</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.5 C7 16 4.5 12.5 4.5 9 a7.5 7.5 0 0 1 15 0 C19.5 12.5 17 16 12 21.5 Z"/><path d="M8.5 10 L12 7 L15.5 10 V13 H8.5 Z"/></svg>
      <div class="label">Ubicación</div><div class="sub">pin + tejado</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 9 L16 4.5 L21 9 V14 H17"/><path d="M3 13 L10 7 L17 13 V20 H3 Z"/><path d="M8 20 V15 H12 V20"/></svg>
      <div class="label">Cartera</div><div class="sub">multi</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10 L12 3 L20 10"/><path d="M4 14 L12 21 L20 14"/></svg>
      <div class="label">Compraventa</div><div class="sub">flujo</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13 L12 5 L20 13"/><path d="M7 11.5 V20 H17 V11.5"/></svg>
      <div class="label">Chevron</div><div class="sub">monograma</div>
    </div>
    <div class="tile" style="opacity:0.5">
      <div style="width:28px;height:28px;border:1px dashed var(--border-strong);border-radius:4px"></div>
      <div class="label">+ 5 más</div><div class="sub">brand-icons.tsx</div>
    </div>
  </div>
</body>
</html>
