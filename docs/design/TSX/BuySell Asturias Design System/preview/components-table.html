<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; background: var(--bg); }
  .table-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--surface); overflow: hidden; box-shadow: var(--shadow-xs); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: rgba(244,243,238,0.6); }
  th { padding: 8px 12px; text-align: left; font-size: 12px; font-weight: 500; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  th:first-child { padding-left: 20px; }
  th:last-child { padding-right: 20px; text-align: right; }
  td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  td:first-child { padding-left: 20px; }
  td:last-child { padding-right: 20px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: rgba(244,243,238,0.4); }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 6px; font-size: 12px; font-weight: 500; border-radius: var(--radius-md); border: 1px solid; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; opacity: 0.7; }
</style>
</head>
<body>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Inmueble</th><th>Estado</th><th>Precio</th></tr>
      </thead>
      <tbody>
        <tr><td>Piso · Centro, Oviedo</td><td><span class="badge" style="background:#E1EEF1;color:#2C7A8A;border-color:rgba(44,122,138,0.15)"><span class="dot"></span>En venta</span></td><td>385.000 €</td></tr>
        <tr><td>Chalet · Llanes</td><td><span class="badge" style="background:#F7EFDE;color:#A86A17;border-color:rgba(168,106,23,0.20)"><span class="dot"></span>Reservado</span></td><td>620.000 €</td></tr>
        <tr><td>Ático · Gijón centro</td><td><span class="badge" style="background:#E8F1EC;color:#2D6A4F;border-color:rgba(45,106,79,0.15)"><span class="dot"></span>Vendido</span></td><td>295.000 €</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
