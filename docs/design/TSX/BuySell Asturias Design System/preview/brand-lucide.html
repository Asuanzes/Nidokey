<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; margin: 0; background: var(--bg); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--text-subtle);
    gap: 6px;
  }
  .tile svg { width: 20px; height: 20px; stroke-width: 2; }
  .lbl { font-size: 9px; font-family: var(--font-mono); }
  .caption { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
</style>
</head>
