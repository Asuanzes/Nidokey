<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; margin: 0; display: flex; gap: 18px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; }
  .box { background: var(--primary); }
  .meta { margin-top: 8px; font-size: 10px; color: var(--text-subtle); font-family: var(--font-mono); text-align: center; }
  .meta b { display: block; color: var(--text); font-family: var(--font-sans); font-weight: 500; font-size: 11px; margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="swatch"><div class="box" style="width:4px;height:32px"></div><div class="meta"><b>4</b>0.5</div></div>
  <div class="swatch"><div class="box" style="width:8px;height:32px"></div><div class="meta"><b>8</b>2</div></div>
  <div class="swatch"><div class="box" style="width:12px;height:32px"></div><div class="meta"><b>12</b>3</div></div>
  <div class="swatch"><div class="box" style="width:16px;height:32px"></div><div class="meta"><b>16</b>4</div></div>
  <div class="swatch"><div class="box" style="width:20px;height:32px"></div><div class="meta"><b>20</b>5 · card body</div></div>
  <div class="swatch"><div class="box" style="width:24px;height:32px"></div><div class="meta"><b>24</b>6 · gutter</div></div>
  <div class="swatch"><div class="box" style="width:32px;height:32px"></div><div class="meta"><b>32</b>8 · top pad</div></div>
  <div class="swatch"><div class="box" style="width:56px;height:32px"></div><div class="meta"><b>56</b>14 · topbar h</div></div>
</body>
</html>
