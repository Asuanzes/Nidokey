<!doctype html><html lang="es"><head><meta charset="utf-8"><title>BuySell · Web · Login</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#1a1a1a}body{display:flex;align-items:center;justify-content:center;min-height:100vh}#root{width:1440px;height:900px}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body><div id="root"></div>
<script type="text/babel" src="lucide-shim.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useState } = React;

function LoginPage() {
  const [sent, setSent] = useState(false);
  const [email, setEmail] = useState("");
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "center",
      width: "100%", height: "100%", background: T.bg, fontFamily: FONT,
    }}>
      <div style={{
        width: 380, background: T.surface, border: `1px solid ${T.border}`,
        borderRadius: 12, boxShadow: "0 4px 12px rgba(20,20,18,0.06), 0 1px 3px rgba(20,20,18,0.04)",
        padding: "40px 32px", textAlign: "center",
      }}>
        <div style={{
          width: 56, height: 56, borderRadius: 12, margin: "0 auto 20px",
          display: "flex", alignItems: "center", justifyContent: "center",
          background: T.primarySoft, color: T.primary,
          boxShadow: "inset 0 0 0 1px rgba(58,95,138,0.15)",
        }}>
          <BrandKey size={32}/>
        </div>

        <h1 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: T.text }}>BuySell Asturias</h1>
        <p style={{ margin: "8px 0 0", fontSize: 13, color: T.textMuted, lineHeight: 1.5 }}>
          {sent
            ? "Revisa tu bandeja. Pulsa el enlace que te hemos mandado para entrar."
            : "Te enviaremos un enlace por email para entrar sin contraseña."}
        </p>

        {sent ? (
          <div style={{
            marginTop: 24, padding: "12px 16px", borderRadius: 8,
            background: T.successBg, border: `1px solid rgba(45,106,79,0.15)`,
            display: "flex", alignItems: "center", gap: 10, textAlign: "left",
          }}>
            <div style={{ width: 24, height: 24, borderRadius: 999, background: T.successFg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.successFg }}>Email enviado</div>
              <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>{email}</div>
            </div>
          </div>
        ) : (
          <div style={{ marginTop: 24 }}>
            <div style={{ position: "relative" }}>
              <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.textSubtle} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)}
                placeholder="tu@email.com"
                style={{
                  height: 40, width: "100%", boxSizing: "border-box", paddingLeft: 36, paddingRight: 12,
                  border: `1px solid ${T.border}`, borderRadius: 8,
                  background: T.surface, color: T.text, fontSize: 14, fontFamily: FONT,
                  outline: "none",
                }}/>
            </div>
            <button onClick={() => email && setSent(true)}
              style={{
                width: "100%", height: 40, marginTop: 12, borderRadius: 8, border: "none",
                background: T.primary, color: T.primaryFg, fontSize: 14, fontWeight: 500,
                cursor: "pointer", fontFamily: FONT,
              }}>Enviar enlace de acceso</button>
          </div>
        )}

        <p style={{ margin: "20px 0 0", fontSize: 11, color: T.textSubtle }}>
          Solo usuarios autorizados · uso personal
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LoginPage/>);
</script></body></html>
