// ---- Card shell ----
function Card({ children, style }) {
  return (
    <div style={{
      background: T.surface, border: `1px solid ${T.border}`,
      borderRadius: 8, boxShadow: "0 1px 2px rgba(20,20,18,0.04)",
      overflow: "hidden", ...style,
    }}>{children}</div>

}
function CardH({ title, right }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "12px 20px", borderBottom: `1px solid ${T.border}`,

      <h3 style={{ margin: 0, fontSize: 13, fontWeight: 600, color: T.text, fontFamily: FONT }}>{title}</h3>
      {right}
    </div>
  );
}
function CardB({ children, style }) {
  return <div style={{ padding: 20, ...style }}>{children}</div>;
}

// ---- Price History Chart (SVG) ----
function PriceChart({ data }) {
  const w = 560, h = 160;
  const pad = { l: 50, r: 12, t: 8, b: 24 };
  const prices = data.map(d => d.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const padY = range * 0.2;
  const yMin = min - padY, yMax = max + padY;
  const x = (i) => pad.l + (i * (w - pad.l - pad.r)) / (data.length - 1 || 1);
  const y = (v) => pad.t + (1 - (v - yMin) / (yMax - yMin)) * (h - pad.t - pad.b);
  const line = data.map((d, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)} ${y(d.price).toFixed(1)}`).join(" ");
  const area = `${line} L ${x(data.length-1).toFixed(1)} ${(h - pad.b)} L ${x(0).toFixed(1)} ${(h - pad.b)} Z`;
  const yTicks = [0, 0.5, 1].map(t => yMin + t * (yMax - yMin));
  const xLabels = [0, Math.floor(data.length/2), data.length-1].map(i => ({
    x: x(i), label: new Date(data[i].date).toLocaleDateString("es-ES", { day: "2-digit", month: "short" }),
  }));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: h, fontFamily: FONT }}>
      <defs>
        <linearGradient id="pf" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.primary} stopOpacity="0.18"/>
          <stop offset="100%" stopColor={T.primary} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {yTicks.map((v, i) => (
        <g key={i}>
          <line x1={pad.l} x2={w - pad.r} y1={y(v)} y2={y(v)} stroke={T.border} strokeDasharray="3 3"/>
          <text x={pad.l - 6} y={y(v) + 4} fill={T.textSubtle} fontSize="11" textAnchor="end">
            {(v / 1000).toFixed(0)}k
          </text>
        </g>
      ))}
      {xLabels.map((l, i) => (
        <text key={i} x={l.x} y={h - 6} fill={T.textSubtle} fontSize="11" textAnchor="middle">{l.label}</text>
      ))}
      <path d={area} fill="url(#pf)"/>
      <path d={line} fill="none" stroke={T.primary} strokeWidth="2"/>
      {data.map((d, i) => (
        <circle key={i} cx={x(i)} cy={y(d.price)} r="3" fill={T.surface} stroke={T.primary} strokeWidth="2"/>
      ))}
    </svg>
  );
}

// ---- Gallery ----
function Gallery({ photos }) {
  const [idx, setIdx] = useState(0);
  const prev = () => setIdx((i) => (i - 1 + photos.length) % photos.length);
  const next = () => setIdx((i) => (i + 1) % photos.length);
  return (
    <div style={{ position: "relative", borderRadius: 8, overflow: "hidden", border: `1px solid ${T.border}` }}>
      <div style={{
        aspectRatio: "16/10", background: photos[idx],
        display: "flex", alignItems: "center", justifyContent: "center",
      }}/>
      {/* Nav arrows */}
      {photos.length > 1 && <>
        <button onClick={prev} style={galleryBtn("left")}><ChevronLeft size={18} color={T.text}/></button>
        <button onClick={next} style={galleryBtn("right")}><ChevronRight size={18} color={T.text}/></button>
      </>}
      {/* Dots */}
      <div style={{
        position: "absolute", bottom: 12, left: "50%", transform: "translateX(-50%)",
        display: "flex", gap: 6,
      }}>
        {photos.map((_, i) => (
          <div key={i} onClick={() => setIdx(i)} style={{
            width: i === idx ? 16 : 6, height: 6, borderRadius: 999,
            background: i === idx ? T.surface : "rgba(255,255,255,0.5)",
            cursor: "pointer", transition: "width 200ms",
          }}/>
        ))}
      </div>
      {/* Counter */}
      <div style={{
        position: "absolute", bottom: 12, right: 12, padding: "3px 8px",
        borderRadius: 6, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)",
        color: "#fff", fontSize: 11, fontWeight: 500, ...TAB,
      }}>{idx + 1} / {photos.length}</div>
    </div>
  );
}
function galleryBtn(side) {
  return {
    position: "absolute", top: "50%", [side]: 12, transform: "translateY(-50%)",
    width: 36, height: 36, borderRadius: 999, border: "none",
    background: "rgba(255,255,255,0.9)", backdropFilter: "blur(4px)",
    display: "flex", alignItems: "center", justifyContent: "center",
    cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.12)",
  };
}

                  </div>
                  <div style={{ marginTop: 12, fontSize: 32, fontWeight: 600, letterSpacing: "-0.02em", ...TAB }}>
                    {fmtEur(P.currentPrice)}
                  </div>
                  <div style={{ marginTop: 4, fontSize: 12, color: T.textMuted, ...TAB }}>
                    {Math.round(P.currentPrice / P.builtArea).toLocaleString("es-ES")} €/m²
                  </div>
                </CardB>
              </Card>

              {/* Characteristics */}
              <Card>
                <CardH title="Características"/>
                <CardB style={{ padding: "12px 20px" }}>
                  <SpecRow label="Tipo" value={P.type}/>
                  <SpecRow label="Habitaciones" value={P.rooms}/>
                  <SpecRow label="Baños" value={P.bathrooms}/>
                  <SpecRow label="Construidos" value={`${P.builtArea} m²`}/>
                  <SpecRow label="Útiles" value={`${P.usableArea} m²`}/>
                  <SpecRow label="Planta" value={P.floor}/>
                  <SpecRow label="Año" value={P.yearBuilt}/>
                  <SpecRow label="Energía" value={P.energyRating}/>
                  <div style={{ marginTop: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 500, color: T.textMuted, marginBottom: 8 }}>Extras</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {P.hasElevator && <Feature label="Ascensor"/>}
                      {P.hasTerrace && <Feature label="Terraza"/>}
                      {P.hasStorage && <Feature label="Trastero"/>}
                      {P.hasGarage && <Feature label="Garaje"/>}
                      {P.hasFireplace && <Feature label="Chimenea"/>}
                    </div>
                  </div>
                </CardB>
              </Card>

              {/* Location */}
              <Card>
                <CardH title="Ubicación"/>
                <CardB>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 8, fontSize: 13 }}>
                    <MapPin size={14} color={T.textSubtle} style={{ marginTop: 1, flexShrink: 0 }}/>
                    <div>
                      <div style={{ color: T.text }}>{P.address}</div>
                      <div style={{ color: T.textMuted, marginTop: 2 }}>
                        {P.neighborhood}, {P.postalCode} {P.city}
                      </div>
                      <div style={{ color: T.textMuted }}>{P.province}, España</div>
                    </div>
                  </div>
                </CardB>
              </Card>

              {/* Linked listings */}
              <Card>
                <CardH title="Anuncios vinculados"/>
                <CardB style={{ padding: 0 }}>
                  {P.listings.map((l, i) => (
                    <div key={i} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                      gap: 8, padding: "12px 20px",
                      borderBottom: i < P.listings.length - 1 ? `1px solid ${T.border}` : "none",
                    }}>
                      <div>
                        <a href="#" onClick={(e) => e.preventDefault()} style={{
                          display: "inline-flex", alignItems: "center", gap: 4,
                          fontSize: 13, fontWeight: 500, color: T.primary, textDecoration: "none",
                        }}>
                          {l.portal} <ExternalLink size={11}/>
                        </a>
                        <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2, ...TAB }}>
                          {fmtEur(l.lastPrice)} · revisado {l.checkedAt}
                        </div>
                      </div>
                      <span style={{
                        display: "inline-flex", alignItems: "center", gap: 4,
                        padding: "2px 6px", borderRadius: 6, fontSize: 11, fontWeight: 500,
                        border: "1px solid", ...listingStatusStyle(l.status),
                      }}>{l.status}</span>
                    </div>
                  ))}
                </CardB>
              </Card>
            </aside>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<WebDetail/>);
</script>
</body>
</html>
