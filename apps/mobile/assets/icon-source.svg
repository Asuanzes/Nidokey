<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Fondo redondeado -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#3A5F8A"/>

  <!-- Llave estilizada: anillo superior en forma de gota/pin de mapa -->
  <!-- El anillo es la parte superior, el tallo baja hacia abajo con los dientes -->

  <!-- Anillo (gota / pin de mapa): círculo exterior -->
  <circle cx="512" cy="340" r="175" fill="none" stroke="#C49A4D" stroke-width="72"/>

  <!-- Hueco interior del anillo -->
  <!-- (ya lo da el fill:none + stroke) -->

  <!-- Punta inferior de la gota -->
  <path d="M 457 490 Q 512 600 512 600 Q 512 600 567 490" fill="#C49A4D"/>

  <!-- Punto interior del anillo (círculo relleno pequeño) -->
  <circle cx="512" cy="340" r="60" fill="#C49A4D"/>

  <!-- Tallo de la llave -->
  <rect x="476" y="590" width="72" height="260" rx="36" fill="#C49A4D"/>

  <!-- Diente 1 (derecha, arriba) -->
  <rect x="548" y="660" width="64" height="52" rx="18" fill="#C49A4D"/>

  <!-- Diente 2 (derecha, abajo) -->
  <rect x="548" y="760" width="48" height="52" rx="18" fill="#C49A4D"/>
</svg>
