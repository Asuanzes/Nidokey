services:
  postgres:
    image: postgres:17-alpine
    container_name: nidokey-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nidokey
      POSTGRES_PASSWORD: nidokey
      POSTGRES_DB: nidokey
    ports:
      - "5432:5432"
    volumes:
      - nidokey-pgdata:/var/lib/postgresql/data

volumes:
  nidokey-pgdata:
